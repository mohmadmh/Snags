<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة الثعبان المطور</title>
    <style>
        body { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; background: #1a1a1a; color: white; font-family: sans-serif;
            touch-action: none; 
        }
        canvas { 
            border: 5px solid #2ecc71; background: #000; 
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.4);
            /* تكبير مساحة العرض على الشاشة */
            width: 95vw; height: auto; max-width: 500px; 
        }
        .controls { display: grid; grid-template-columns: repeat(3, 85px); gap: 12px; margin-top: 25px; }
        .btn { 
            width: 85px; height: 85px; background: #333; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 35px; user-select: none; border: 3px solid #444;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: #2ecc71; border-color: #fff; }
        .up { grid-column: 2; }
        .left { grid-column: 1; }
        .down { grid-column: 2; }
        .right { grid-column: 3; }
        .stats { margin-bottom: 10px; font-size: 24px; font-weight: bold; color: #2ecc71; }
    </style>
</head>
<body>

    <div class="stats">النقاط: <span id="score">0</span></div>
    <canvas id="snakeGame" width="600" height="600"></canvas>

    <div class="controls">
        <div class="btn up" onclick="setDir('UP')">⬆️</div>
        <div class="btn left" onclick="setDir('LEFT')">⬅️</div>
        <div class="btn down" onclick="setDir('DOWN')">⬇️</div>
        <div class="btn right" onclick="setDir('RIGHT')">➡️</div>
    </div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const box = 30; // تكبير حجم المربع الواحد من 20 إلى 30
        let snake = [{ x: 10 * box, y: 10 * box }];
        let food = { x: Math.floor(Math.random() * 19) * box, y: Math.floor(Math.random() * 19) * box };
        let score = 0;
        let d = "RIGHT";
        let nextD = "RIGHT";

        function setDir(newDir) {
            if(newDir == "LEFT" && d != "RIGHT") nextD = "LEFT";
            if(newDir == "UP" && d != "DOWN") nextD = "UP";
            if(newDir == "RIGHT" && d != "LEFT") nextD = "RIGHT";
            if(newDir == "DOWN" && d != "UP") nextD = "DOWN";
        }

        function drawSnakePart(part, isHead) {
            if (isHead) {
                // رسم رأس الثعبان
                ctx.fillStyle = "#2ecc71";
                ctx.beginPath();
                ctx.roundRect(part.x, part.y, box, box, 10); // رأس دائري الأطراف
                ctx.fill();
                
                // رسم العينين
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(part.x + 8, part.y + 8, 4, 0, Math.PI * 2); // عين يسار
                ctx.arc(part.x + box - 8, part.y + 8, 4, 0, Math.PI * 2); // عين يمين
                ctx.fill();
                ctx.fillStyle = "black";
                ctx.beginPath();
                ctx.arc(part.x + 8, part.y + 8, 2, 0, Math.PI * 2);
                ctx.arc(part.x + box - 8, part.y + 8, 2, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // رسم جسم الثعبان بشكل دائري
                ctx.fillStyle = "#27ae60";
                ctx.beginPath();
                ctx.arc(part.x + box/2, part.y + box/2, box/2 - 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function draw() {
            d = nextD;
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // رسم الثعبان
            for(let i = 0; i < snake.length; i++) {
                drawSnakePart(snake[i], i === 0);
            }

            // رسم الطعام (تفاحة)
            ctx.fillStyle = "#e74c3c";
            ctx.beginPath();
            ctx.arc(food.x + box/2, food.y + box/2, box/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            // ورقة التفاحة
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(food.x + box/2 - 2, food.y + 2, 4, 8);

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if( d == "LEFT") snakeX -= box;
            if( d == "UP") snakeY -= box;
            if( d == "RIGHT") snakeX += box;
            if( d == "DOWN") snakeY += box;

            if(snakeX == food.x && snakeY == food.y) {
                score++;
                scoreElement.innerText = score;
                food = { x: Math.floor(Math.random() * 19) * box, y: Math.floor(Math.random() * 19) * box };
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                alert("انتهت اللعبة! نقاطك: " + score);
                location.reload();
            }

            snake.unshift(newHead);
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        let game = setInterval(draw, 120);
    </script>
</body>
</html>
