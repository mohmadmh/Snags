<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة الدودة - تحكم مضبوط</title>
    <style>
        body { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; background: #121212; color: white; font-family: sans-serif;
            touch-action: none; /* يمنع تحرك الصفحة عند اللعب */
        }
        canvas { border: 4px solid #444; background: #000; max-width: 95vw; max-height: 45vh; box-shadow: 0 0 15px rgba(0,255,0,0.1); }
        .controls { display: grid; grid-template-columns: repeat(3, 80px); gap: 15px; margin-top: 30px; }
        .btn { 
            width: 80px; height: 80px; background: #333; border-radius: 15px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 30px; user-select: none; border: 2px solid #555;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: #555; transform: scale(0.9); }
        .up { grid-column: 2; grid-row: 1; }
        .left { grid-column: 1; grid-row: 2; }
        .down { grid-column: 2; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
        .stats { margin-bottom: 10px; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="stats">النقاط: <span id="score">0</span></div>
    <canvas id="snakeGame" width="400" height="400"></canvas>

    <div class="controls">
        <div class="btn up" onclick="setDir('UP')">⬆️</div>
        <div class="btn left" onclick="setDir('LEFT')">⬅️</div>
        <div class="btn down" onclick="setDir('DOWN')">⬇️</div>
        <div class="btn right" onclick="setDir('RIGHT')">➡️</div>
    </div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const box = 20;
        let snake = [{ x: 10 * box, y: 10 * box }];
        let food = { x: Math.floor(Math.random() * 19 + 1) * box, y: Math.floor(Math.random() * 19 + 1) * box };
        let score = 0;
        let d = "RIGHT";
        let nextD = "RIGHT";

        function setDir(newDir) {
            if(newDir == "LEFT" && d != "RIGHT") nextD = "LEFT";
            if(newDir == "UP" && d != "DOWN") nextD = "UP";
            if(newDir == "RIGHT" && d != "LEFT") nextD = "RIGHT";
            if(newDir == "DOWN" && d != "UP") nextD = "DOWN";
        }

        function draw() {
            d = nextD; // تحديث الاتجاه الفعلي قبل الرسم
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#00FF00" : "#008000";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeStyle = "black";
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            ctx.fillStyle = "red";
            ctx.beginPath();
            ctx.arc(food.x + box/2, food.y + box/2, box/2, 0, Math.PI*2);
            ctx.fill();

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if( d == "LEFT") snakeX -= box;
            if( d == "UP") snakeY -= box;
            if( d == "RIGHT") snakeX += box;
            if( d == "DOWN") snakeY += box;

            if(snakeX == food.x && snakeY == food.y) {
                score++;
                scoreElement.innerText = score;
                food = { x: Math.floor(Math.random() * 19 + 1) * box, y: Math.floor(Math.random() * 19 + 1) * box };
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                alert("انتهت اللعبة! مجموع نقاطك: " + score);
                location.reload();
            }

            snake.unshift(newHead);
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        let game = setInterval(draw, 150);
    </script>
</body>
</html>
