<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة الثعبان - إصلاح التحكم</title>
    <style>
        body { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; background: #121212; color: white; font-family: sans-serif;
            touch-action: none; 
        }
        canvas { 
            border: 4px solid #2ecc71; background: #000; 
            width: 90vw; max-width: 500px; height: auto;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.3);
        }
        /* تنسيق أزرار التحكم لضمان عدم الانقلاب */
        .controls { 
            display: grid; 
            grid-template-columns: repeat(3, 80px); 
            grid-template-rows: repeat(2, 80px); 
            gap: 15px; 
            margin-top: 25px; 
        }
        .btn { 
            width: 80px; height: 80px; background: #333; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 32px; user-select: none; border: 3px solid #444;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: #2ecc71; transform: scale(0.9); }
        
        /* تحديد أماكن الأزرار بدقة في الشبكة */
        .up    { grid-column: 2; grid-row: 1; }
        .left  { grid-column: 1; grid-row: 2; }
        .down  { grid-column: 2; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }

        .stats { margin-bottom: 10px; font-size: 22px; color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>

    <div class="stats">النقاط: <span id="score">0</span></div>
    <canvas id="snakeGame" width="600" height="600"></canvas>

    <div class="controls">
        <div class="btn up" onclick="setDir('UP')">⬆️</div>
        <div class="btn left" onclick="setDir('LEFT')">➡️</div>
        <div class="btn down" onclick="setDir('DOWN')">⬇️</div>
        <div class="btn right" onclick="setDir('RIGHT')">⬅️</div>
    </div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const box = 30;
        let snake = [{ x: 10 * box, y: 10 * box }];
        let food = { x: Math.floor(Math.random() * 19) * box, y: Math.floor(Math.random() * 19) * box };
        let score = 0;
        let d = "RIGHT";
        let nextD = "RIGHT";

        // وظيفة تحديد الاتجاه مع منع الانعكاس المفاجئ
        function setDir(newDir) {
            if(newDir === "LEFT" && d !== "RIGHT") nextD = "LEFT";
            else if(newDir === "UP" && d !== "DOWN") nextD = "UP";
            else if(newDir === "RIGHT" && d !== "LEFT") nextD = "RIGHT";
            else if(newDir === "DOWN" && d !== "UP") nextD = "DOWN";
        }

        function draw() {
            d = nextD;
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // رسم الثعبان
            for(let i = 0; i < snake.length; i++) {
                if (i === 0) { // الرأس
                    ctx.fillStyle = "#2ecc71";
                    ctx.beginPath();
                    ctx.roundRect(snake[i].x, snake[i].y, box, box, 8);
                    ctx.fill();
                    // عيون الثعبان
                    ctx.fillStyle = "white";
                    ctx.beginPath();
                    ctx.arc(snake[i].x + 8, snake[i].y + 8, 4, 0, Math.PI*2);
                    ctx.arc(snake[i].x + box - 8, snake[i].y + 8, 4, 0, Math.PI*2);
                    ctx.fill();
                } else { // الجسم
                    ctx.fillStyle = "#27ae60";
                    ctx.beginPath();
                    ctx.arc(snake[i].x + box/2, snake[i].y + box/2, box/2 - 2, 0, Math.PI*2);
                    ctx.fill();
                }
            }

            // رسم الطعام
            ctx.fillStyle = "#e74c3c";
            ctx.beginPath();
            ctx.arc(food.x + box/2, food.y + box/2, box/2 - 3, 0, Math.PI*2);
            ctx.fill();

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if( d === "LEFT") snakeX -= box;
            if( d === "UP") snakeY -= box;
            if( d === "RIGHT") snakeX += box;
            if( d === "DOWN") snakeY += box;

            if(snakeX === food.x && snakeY === food.y) {
                score++;
                scoreElement.innerText = score;
                food = { x: Math.floor(Math.random() * 19) * box, y: Math.floor(Math.random() * 19) * box };
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                alert("Game Over! Score: " + score);
                location.reload();
            }

            snake.unshift(newHead);
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x === array[i].x && head.y === array[i].y) return true;
            }
            return false;
        }

        let game = setInterval(draw, 130);
    </script>
</body>
</html>
