<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة الثعبان - تحكم باللمس</title>
    <style>
        body { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; background: #121212; color: white; font-family: sans-serif;
            overflow: hidden; touch-action: none; /* منع تحريك المتصفح عند السحب */
        }
        canvas { 
            border: 4px solid #2ecc71; background: #000; 
            width: 90vw; max-width: 500px; height: auto;
            border-radius: 10px;
        }
        .info { text-align: center; margin-bottom: 10px; }
        .score { font-size: 24px; color: #2ecc71; font-weight: bold; }
        .hint { font-size: 14px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="info">
        <div class="score">النقاط: <span id="score">0</span></div>
        <div class="hint">اسحب إصبعك على الشاشة للتحرك ☝️👇⬅️➡️</div>
    </div>

    <canvas id="snakeGame" width="600" height="600"></canvas>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const box = 30;
        let snake = [{ x: 10 * box, y: 10 * box }];
        let food = { x: Math.floor(Math.random() * 19) * box, y: Math.floor(Math.random() * 19) * box };
        let score = 0;
        let d = "RIGHT";
        let nextD = "RIGHT";

        // متغيرات لتتبع اللمس
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        // اكتشاف بداية اللمس
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, false);

        // اكتشاف نهاية اللمس وحساب الاتجاه
        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            touchEndY = e.changedTouches[0].screenY;
            handleSwipe();
        }, false);

        function handleSwipe() {
            let dx = touchEndX - touchStartX;
            let dy = touchEndY - touchStartY;

            // تحديد ما إذا كان السحب أفقياً أم رأسياً (بناءً على المسافة الأكبر)
            if (Math.abs(dx) > Math.abs(dy)) {
                // سحب أفقي
                if (dx > 30 && d !== "LEFT") nextD = "RIGHT";
                else if (dx < -30 && d !== "RIGHT") nextD = "LEFT";
            } else {
                // سحب رأسي
                if (dy > 30 && d !== "UP") nextD = "DOWN";
                else if (dy < -30 && d !== "DOWN") nextD = "UP";
            }
        }

        function draw() {
            d = nextD;
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for(let i = 0; i < snake.length; i++) {
                if(i === 0) {
                    ctx.fillStyle = "#2ecc71"; // الرأس
                    ctx.beginPath();
                    ctx.roundRect(snake[i].x, snake[i].y, box, box, 10);
                    ctx.fill();
                    // عيون
                    ctx.fillStyle = "white";
                    ctx.beginPath();
                    ctx.arc(snake[i].x + 8, snake[i].y + 8, 4, 0, Math.PI*2);
                    ctx.arc(snake[i].x + box - 8, snake[i].y + 8, 4, 0, Math.PI*2);
                    ctx.fill();
                } else {
                    ctx.fillStyle = "#27ae60"; // الجسم
                    ctx.beginPath();
                    ctx.arc(snake[i].x + box/2, snake[i].y + box/2, box/2 - 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // طعام
            ctx.fillStyle = "red";
            ctx.beginPath();
            ctx.arc(food.x + box/2, food.y + box/2, box/2 - 2, 0, Math.PI * 2);
            ctx.fill();

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if( d === "LEFT")  snakeX -= box; 
            if( d === "UP")    snakeY -= box;
            if( d === "RIGHT") snakeX += box;
            if( d === "DOWN")  snakeY += box;

            if(snakeX === food.x && snakeY === food.y) {
                score++;
                scoreElement.innerText = score;
                food = { x: Math.floor(Math.random() * 19) * box, y: Math.floor(Math.random() * 19) * box };
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                alert("انتهت اللعبة! نقاطك: " + score);
                location.reload();
            }

            snake.unshift(newHead);
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x === array[i].x && head.y === array[i].y) return true;
            }
            return false;
        }

        let game = setInterval(draw, 140);
    </script>
</body>
</html>
