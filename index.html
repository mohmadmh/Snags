<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة الثعبان - قائمة المتصدرين</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <style>
        body { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; background: #121212; color: white; font-family: sans-serif;
            overflow-x: hidden; touch-action: none;
        }
        canvas { 
            border: 4px solid #2ecc71; background: #000; width: 90vw; max-width: 400px; border-radius: 10px;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.2);
        }
        .leaderboard {
            width: 90vw; max-width: 400px; background: #1e1e1e; padding: 15px; border-radius: 10px; margin-top: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .leaderboard h3 { margin: 0 0 10px 0; color: #2ecc71; text-align: center; font-size: 18px; }
        .score-entry { 
            display: flex; justify-content: space-between; padding: 8px 5px; 
            border-bottom: 1px solid #333; font-size: 14px;
        }
        .score-entry:nth-child(2) { color: #f1c40f; font-weight: bold; } /* المركز الأول */
        .score { font-size: 24px; color: #2ecc71; font-weight: bold; margin-bottom: 5px; }
        .hint { font-size: 12px; color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="score">النقاط: <span id="score">0</span></div>
    <div class="hint">اسحب للتحرك ⬆️👇⬅️➡️</div>
    <canvas id="snakeGame" width="600" height="600"></canvas>

    <div class="leaderboard">
        <h3>🏆 قائمة المتصدرين (أونلاين)</h3>
        <div id="leaderboard-list">جاري التحميل...</div>
    </div>

    <script>
        // إعداد Firebase الخاص بك
        const firebaseConfig = {
          apiKey: "AIzaSyCyIUKce5zNO5RC-owy3Q4lN_5U2helgFA",
          authDomain: "snag-3a9a8.firebaseapp.com",
          projectId: "snag-3a9a8",
          storageBucket: "snag-3a9a8.firebasestorage.app",
          messagingSenderId: "839051220498",
          appId: "1:839051220498:web:7138ee4f48e7c9b873eacb",
          measurementId: "G-PQYTC13L06"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const box = 30;
        let snake = [{ x: 10 * box, y: 10 * box }];
        let food = { x: Math.floor(Math.random() * 19) * box, y: Math.floor(Math.random() * 19) * box };
        let score = 0;
        let d = "RIGHT";
        let nextD = "RIGHT";

        // التحكم باللمس
        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }, {passive: false});
        document.addEventListener('touchend', (e) => {
            let dx = e.changedTouches[0].clientX - touchStartX;
            let dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30 && d !== "LEFT") nextD = "RIGHT";
                else if (dx < -30 && d !== "RIGHT") nextD = "LEFT";
            } else {
                if (dy > 30 && d !== "UP") nextD = "DOWN";
                else if (dy < -30 && d !== "DOWN") nextD = "UP";
            }
        });

        // حفظ النتيجة
        async function saveScore(playerName, finalScore) {
            try {
                await db.collection("leaderboard").add({
                    name: playerName,
                    score: finalScore,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                loadLeaderboard();
            } catch (e) { console.error("Error saving: ", e); }
        }

        // تحميل القائمة
        async function loadLeaderboard() {
            try {
                const snapshot = await db.collection("leaderboard").orderBy("score", "desc").limit(10).get();
                const list = document.getElementById("leaderboard-list");
                list.innerHTML = "";
                if(snapshot.empty) list.innerHTML = "لا يوجد نتائج بعد. كن أول الفائزين!";
                snapshot.forEach(doc => {
                    const data = doc.data();
                    list.innerHTML += `<div class="score-entry"><span>👤 ${data.name}</span><span>${data.score} نقطة</span></div>`;
                });
            } catch (e) { console.error("Error loading: ", e); }
        }

        function draw() {
            d = nextD;
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i === 0) ? "#2ecc71" : "#27ae60";
                ctx.fillRect(snake[i].x, snake[i].y, box-2, box-2);
            }
            
            ctx.fillStyle = "#e74c3c";
            ctx.beginPath();
            ctx.arc(food.x + box/2, food.y + box/2, box/2 - 2, 0, Math.PI*2);
            ctx.fill();

            let snakeX = snake[0].x, snakeY = snake[0].y;
            if( d === "LEFT")  snakeX -= box; 
            if( d === "UP")    snakeY -= box;
            if( d === "RIGHT") snakeX += box;
            if( d === "DOWN")  snakeY += box;

            if(snakeX === food.x && snakeY === food.y) {
                score++;
                scoreElement.innerText = score;
                food = { x: Math.floor(Math.random() * 19) * box, y: Math.floor(Math.random() * 19) * box };
            } else { snake.pop(); }

            let newHead = { x: snakeX, y: snakeY };

            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                let playerName = prompt("انتهت اللعبة! نقاطك: " + score + "\nادخل اسمك للتصنيف:");
                if(playerName && playerName.trim() !== "") {
                    saveScore(playerName, score);
                } else {
                    location.reload();
                }
            }
            snake.unshift(newHead);
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) { if(head.x === array[i].x && head.y === array[i].y) return true; }
            return false;
        }

        let game = setInterval(draw, 140);
        loadLeaderboard(); // تحميل القائمة عند فتح اللعبة
    </script>
</body>
</html>
